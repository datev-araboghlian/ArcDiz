<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Us – ArcDiz</title>

  <!-- SEO -->
  <meta name="description" content="Get in touch with ArcDiz for architectural and interior design projects. Phone, email, and a quick contact form." />

  <!-- Open Graph -->
  <meta property="og:title" content="Contact ArcDiz" />
  <meta property="og:description" content="Reach ArcDiz via phone, email, or the contact form." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/og-contact.jpg" />
  <meta property="og:url" content="https://example.com/contact.html" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/ArcDiz_tab_logo.png" />

  <!-- Fonts & Styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
</head>
<body>
  <div class="page-wrapper">
    <!-- Header / Nav -->
    <div class="nav-elements" role="navigation" aria-label="Main">
      <a href="index.html" class="logo-link">
        <img src="assets/ArcDiz_logo.png" alt="ArcDiz Logo" class="logo" />
      </a>

      <!-- Mobile menu toggle -->
      <input type="checkbox" id="menu-toggle" class="menu-toggle"
             aria-controls="primary-menu" aria-expanded="false" />
      <label for="menu-toggle" class="menu-button" aria-label="Open menu">
        <span class="bar" aria-hidden="true"></span>
        <span class="bar" aria-hidden="true"></span>
        <span class="bar" aria-hidden="true"></span>
      </label>

      <nav id="primary-menu" class="menu-panel" aria-label="Primary">
        <label for="menu-toggle" class="menu-close" aria-label="Close menu"></label>
        <ul>
          <li><a href="index.html" class="menu-link">Home</a></li>
          <li><a href="about.html" class="menu-link">About</a></li>
          <li><a href="interior.html" class="menu-link">Portfolio</a></li>
          <li><a href="pricing.html" class="menu-link">Pricing</a></li>
          <li><a href="contact.html" class="menu-link" aria-current="page">Contact Us</a></li>
        </ul>
      </nav>
    </div>

    <!-- Main -->
    <main class="contacts-page">
      <style>
        .contacts-page {
          padding-top: 80px;
        }
        .contacts-banner {
          background: #c8c8c8;
          padding: 50px 0;
          text-align: center;
        }
        .contacts-banner h1 {
          font-size: 28px;
          font-weight: 400;
          letter-spacing: 8px;
          color: #000;
          margin: 0;
          text-transform: uppercase;
        }
        .contacts-content {
          max-width: 600px;
          margin: 0 auto;
          padding: 60px 20px;
        }
        .contact-phone {
          font-size: 22px;
          font-weight: 400;
          color: #000;
          margin-bottom: 15px;
          transition: color 0.3s ease;
        }
        .contact-phone:hover {
          color: #888;
        }
        .contact-email {
          font-size: 18px;
          font-weight: 400;
          color: #000;
          text-decoration: none;
          transition: color 0.3s ease;
          display: inline-block;
          margin-bottom: 25px;
        }
        .contact-email:hover {
          color: #888;
        }
        .contact-socials {
          display: flex;
          gap: 15px;
          margin-bottom: 40px;
        }
        .contact-social-icon {
          width: 40px;
          height: 40px;
          border: 1.5px solid #000;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          color: #000;
          text-decoration: none;
          font-size: 18px;
          transition: all 0.3s ease;
        }
        .contact-social-icon:hover {
          background: #000;
          color: #fff;
        }
        .send-request-btn {
          display: inline-block;
          padding: 15px 40px;
          border: 1.5px solid #000;
          background: transparent;
          color: #000;
          font-size: 13px;
          font-weight: 500;
          letter-spacing: 2px;
          text-transform: uppercase;
          cursor: pointer;
          transition: all 0.3s ease;
        }
        .send-request-btn:hover {
          background: #000;
          color: #fff;
        }
      </style>

      <div class="contacts-banner">
        <h1>Contacts</h1>
      </div>

      <div class="contacts-content">
        <p class="contact-phone">+374 33 600 445</p>
        <a href="mailto:arc.diz@hotmail.com" class="contact-email">arc.diz@hotmail.com</a>
        
        <div class="contact-socials">
          <a href="https://www.facebook.com" target="_blank" class="contact-social-icon" aria-label="Facebook">
            <i class="fa fa-facebook"></i>
          </a>
          <a href="https://www.instagram.com" target="_blank" class="contact-social-icon" aria-label="Instagram">
            <i class="fa fa-instagram"></i>
          </a>
          <a href="https://www.linkedin.com" target="_blank" class="contact-social-icon" aria-label="LinkedIn">
            <i class="fa fa-linkedin"></i>
          </a>
        </div>

        <button class="send-request-btn" onclick="openModal()">SEND REQUEST</button>
      </div>
    </main>
  </div>

  <!-- Defer scripts for performance -->
  <script defer src="menu.js"></script>
  <script defer src="modals.js"></script>

  <!-- Page-specific JS -->
  <script>
    // Keep menu ARIA in sync
    (function () {
      const toggle = document.getElementById('menu-toggle');
      if (!toggle) return;
      const sync = () => toggle.setAttribute('aria-expanded', String(toggle.checked));
      toggle.addEventListener('change', sync);
      sync();
    })();

    // Modal functions
    function openModal() {
      document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }
  </script>

  <!-- Modal Popup -->
  <style>
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
    .modal-box { background: #1a1a1a; color: #fff; padding: 35px; max-width: 450px; width: 100%; position: relative; max-height: 90vh; overflow-y: auto; }
    .modal-close { position: absolute; top: 12px; right: 15px; font-size: 24px; cursor: pointer; color: #fff; }
    .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
    .form-group { flex: 1; position: relative; }
    .form-group input, .form-group textarea { width: 100%; padding: 12px; background: transparent; border: 1px solid #444; color: #fff; font-size: 13px; outline: none; }
    .form-group input::placeholder, .form-group textarea::placeholder { color: #888; opacity: 1; }
    .form-group input:focus, .form-group textarea:focus { border-color: #666; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .radio-group { margin: 15px 0; }
    .radio-group > label { display: block; font-size: 11px; color: #888; margin-bottom: 10px; text-transform: uppercase; }
    .radio-options { display: flex; gap: 25px; }
    .radio-options label { font-size: 12px; color: #ccc; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .radio-options input[type="radio"] { width: 16px; height: 16px; accent-color: #fff; }
    .submit-btn { width: 100%; padding: 14px; background: #fff; color: #000; border: none; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 15px; letter-spacing: 1px; }
    .submit-btn:hover { background: #ddd; }
    .form-note { font-size: 11px; color: #666; margin-top: 20px; }
    .form-disclaimer { font-size: 10px; color: #555; margin-top: 8px; line-height: 1.5; }
    .file-group { margin: 15px 0; }
    .file-input { width: 100%; padding: 12px; background: #333; border: 1px solid #444; color: #fff; font-size: 11px; cursor: pointer; }
  </style>

  <div class="modal" id="modal">
    <div class="modal-box">
      <span class="modal-close" onclick="closeModal()">&times;</span>
      <form action="https://formspree.io/f/xpqrelby" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="_subject" value="New Contact Request from ArcDiz">
        <div class="form-row">
          <div class="form-group"><input type="text" name="firstName" placeholder="Name*" required></div>
          <div class="form-group"><input type="text" name="surname" placeholder="Surname"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><input type="email" name="email" placeholder="Email*" required></div>
          <div class="form-group"><input type="tel" name="phone" placeholder="Phone"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><input type="text" name="city" placeholder="City*" required></div>
          <div class="form-group"><input type="number" name="area_m2" placeholder="Area in m²*" required min="0" step="1"></div>
        </div>
        <div class="form-group file-group">
          <input type="file" class="file-input" name="attachment" accept=".jpeg,.jpg,.pdf,.dwg">
        </div>
        <div class="radio-group">
          <label>Type of object*</label>
          <div class="radio-options">
            <label><input type="radio" name="objectType" value="Residential" required> Residential</label>
            <label><input type="radio" name="objectType" value="Commercial"> Commercial</label>
          </div>
        </div>
        <div class="form-group"><textarea name="message" rows="4" placeholder="Message"></textarea></div>
        <button type="submit" class="submit-btn">SEND REQUEST</button>
        <p class="form-note">* Mandatory Fields</p>
        <p class="form-disclaimer">The information provided via the website is not subject to publication or disclosure to a third party.</p>
      </form>
    </div>
  </div>
</body>
</html>
